name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Build backend (.NET 9)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend/Ecom.Api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

  frontend:
    name: Build frontend (Angular 17)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/ecom-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/ecom-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
