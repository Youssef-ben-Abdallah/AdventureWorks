<h1>My Orders</h1>

<div *ngIf="loading">Loading...</div>
<div class="error" *ngIf="error">{{error}}</div>

<div class="card order-card" *ngFor="let o of orders" data-testid="order-card">
  <div style="display:flex;justify-content:space-between;gap:10px;">
    <div>
      <b>Order #{{o.id}}</b>
      <div class="small">{{o.createdAtUtc | date:'medium'}}</div>
    </div>
    <div>
      <mat-chip class="status-chip" [ngStyle]="statusChipStyle(o.status)">
        <mat-icon class="status-icon">{{ statusIcon(o.status) }}</mat-icon>
        {{ statusLabel(o.status) }}
      </mat-chip>
      <span class="badge">{{o.total | number:'1.2-2'}}</span>
    </div>
  </div>

  <table style="margin-top:10px;">
    <thead><tr><th>Product</th><th>Qty</th><th>Unit</th><th>Total</th></tr></thead>
    <tbody>
      <tr *ngFor="let i of o.items">
        <td>{{i.productName}}</td>
        <td>{{i.qty}}</td>
        <td>{{i.unitPrice | number:'1.2-2'}}</td>
        <td>{{i.lineTotal | number:'1.2-2'}}</td>
      </tr>
    </tbody>
  </table>
</div>
