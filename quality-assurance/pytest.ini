[pytest]
addopts = -ra --strict-markers
pythonpath = .
testpaths = tests
markers =
    static: static review and source-code inspection
    unit_level: isolated black-box checks of single API requirements
    integration: multi-endpoint backend workflow checks
    system: full end-to-end user journeys through the UI
    api: backend API coverage
    ui: selenium browser coverage
    nonfunctional: performance, security, accessibility or compatibility checks
    security: security-focused checks
    regression: regression coverage
    confirmation: confirmation checks for previously faulty behavior
    negative: negative or expected-rejection scenario with mandatory screenshot/log evidence

api_base_url = https://localhost:57240
ui_base_url = http://localhost:4200
admin_username = admin
admin_password = Admin123!
browser = edge
ui_step_delay_seconds = 0.5
